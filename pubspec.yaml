name: expense_tracker_flutter
description: "A new Flutter project"

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  sqflite: ^2.4.2
  path: ^1.9.1
  fl_chart: ^0.68.0
  pdf: ^3.11.0
  printing: ^5.13.2
  path_provider: ^2.1.5
  provider: ^6.1.2
  flutter_launcher_icons: ^0.14.4

dev_dependencies:
  flutter_test:
    sdk: flutter  
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/finance_logo.png


flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/finance_logo.png"
  adaptive_icon_background: "#0f3d3e"
  adaptive_icon_foreground: "assets/finance_logo.png"